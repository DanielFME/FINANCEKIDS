<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego 1 - Finance Kids</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body class="fk-page fk-center-layout">
    <div class="fk-wrap">
        <h1 class="fk-game-title">💰 Elige las cosas que cuestan dinero</h1>

        <div class="fk-items">
            <div class="fk-item" data-correcto="true">🎮 Videojuego</div>
            <div class="fk-item" data-correcto="true">🍕 Pizza</div>
            <div class="fk-item" data-correcto="false">🌈 Arcoíris</div>
            <div class="fk-item" data-correcto="false">👨‍👩‍👧 Amor</div>
            <div class="fk-item" data-correcto="true">🏠 Casa</div>
        </div>

        <div class="fk-actions-row">
            <button id="continuar" class="fk-btn" style="display:none;" onclick="window.location.href='/preguntas1/'">
                Continuar ➡️
            </button>
        </div>
    </div>

    <script>
        const items = document.querySelectorAll('.fk-item');
        let aciertos = 0;

        items.forEach(item => {
            item.addEventListener('click', () => {
                const esCorrecto = item.getAttribute('data-correcto') === 'true';
                if (esCorrecto) {
                    item.classList.add('correcto');
                    aciertos++;
                } else {
                    item.classList.add('incorrecto');
                }
                item.style.pointerEvents = 'none';

                if (aciertos >= 3) {
                    document.getElementById('continuar').style.display = 'inline-block';
                }
            });
        });
    </script>
</body>
</html>
