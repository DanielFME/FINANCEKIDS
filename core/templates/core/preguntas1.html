<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preguntas - Tema 1</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="fk-page">
    <div class="fk-wrap">
        <h1 class="fk-game-title">Preguntas rápidas 🧩</h1>

        <div class="fk-card fk-form-card fk-question">
            <p>1. ¿Para qué sirve el dinero?</p>
            <div class="fk-option-row">
                <button class="fk-btn" onclick="responder(this, true)">Comprar cosas</button>
                <button class="fk-btn-secondary" onclick="responder(this, false)">Hacer magia</button>
            </div>
        </div>

        <div class="fk-card fk-form-card fk-question">
            <p>2. ¿Qué significa ahorrar?</p>
            <div class="fk-option-row">
                <button class="fk-btn" onclick="responder(this, true)">Guardar dinero para el futuro</button>
                <button class="fk-btn-secondary" onclick="responder(this, false)">Gastar todo ya</button>
            </div>
        </div>

        <div class="fk-card fk-form-card fk-question">
            <p>3. ¿Cuál de estos no se compra con dinero?</p>
            <div class="fk-option-row">
                <button class="fk-btn-secondary" onclick="responder(this, false)">Un juguete</button>
                <button class="fk-btn" onclick="responder(this, true)">El amor</button>
            </div>
        </div>

        <div class="fk-actions-row">
            <button id="continuar" class="fk-btn" style="display:none;" onclick="window.location.href='/aprendizaje/2/'">
                🎉 Siguiente tema
            </button>
        </div>

        <div class="fk-actions-row">
            <form method="post" action="{% url 'completar_tema' tema=1 %}">
                {% csrf_token %}
                <button type="submit" class="fk-btn">✅ Completar Tema 1</button>
            </form>
        </div>
    </div>

    <script>
        let correctas = 0;

        function responder(btn, esCorrecta) {
            if (esCorrecta) {
                btn.style.background = '#b8f5c0';
                correctas++;
            } else {
                btn.style.background = '#f5b8b8';
            }

            btn.parentElement.querySelectorAll('button').forEach(b => b.disabled = true);

            if (correctas >= 3) {
                document.getElementById('continuar').style.display = 'inline-block';
            }
        }
    </script>
</body>
</html>
