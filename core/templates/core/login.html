{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Finance Kids</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body class="fk-page fk-center-layout">
    <div class="fk-auth-shell">
        <div class="fk-auth-main">
            <div class="fk-auth-brand">
                <img src="{% static 'img/logo wiliam.jpg' %}" alt="Finance Kids Logo">
                <span>Finance Kids</span>
            </div>

            <form method="POST" class="fk-auth-form">
                {% csrf_token %}
                <h2 class="fk-title">Iniciar Sesión</h2>
                <p class="fk-subtitle">Bienvenido de vuelta. Sigue aprendiendo finanzas.</p>

                {% if error %}
                    <div class="fk-error">{{ error }}</div>
                {% endif %}

                <input class="fk-field" type="text" name="username" placeholder="Nombre de usuario" required>
                <input class="fk-field" type="password" name="password" placeholder="Contraseña" required>

                <div class="fk-auth-actions">
                    <button type="submit" class="fk-btn">Entrar</button>
                    <a href="{% url 'registro' %}" class="fk-btn-secondary">Regístrate</a>
                </div>
            </form>
        </div>

        <div class="fk-auth-visual">
            <img src="https://media.tenor.com/jRfdWEI5BgoAAAAi/upset-pudgypenguins.gif" alt="Finance Kids Mascota">
        </div>
    </div>
</body>
</html>
