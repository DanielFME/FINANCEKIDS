<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preguntas – Tema 2</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="fk-page">
    <div class="fk-wrap">
        <h1 class="fk-game-title">🧠 Preguntas del Tema 2</h1>

        <form method="post" action="{% url 'completar_tema' tema=2 %}" class="fk-card fk-form-card">
            {% csrf_token %}

            <div class="fk-radio-group">
                <label>1️⃣ ¿Qué es un presupuesto?</label>
                <span class="fk-radio-item"><input type="radio" name="q1" required> Es una herramienta para planificar gastos y ahorros.</span>
                <span class="fk-radio-item"><input type="radio" name="q1"> Una forma de gastar sin control.</span>
                <span class="fk-radio-item"><input type="radio" name="q1"> Un tipo de ahorro secreto.</span>
            </div>

            <div class="fk-radio-group">
                <label>2️⃣ ¿Por qué es importante tener un presupuesto?</label>
                <span class="fk-radio-item"><input type="radio" name="q2" required> Porque ayuda a organizar el dinero y cumplir metas.</span>
                <span class="fk-radio-item"><input type="radio" name="q2"> Porque permite gastar más.</span>
                <span class="fk-radio-item"><input type="radio" name="q2"> Porque es obligatorio por ley.</span>
            </div>

            <div class="fk-actions-row">
                <button type="submit" class="fk-btn">✅ Completar Tema</button>
            </div>
        </form>
    </div>
</body>
</html>
